<section id="contact" class="py-20 bg-dark/50">
  <div class="container-custom">
    <h2 class="text-4xl md:text-5xl font-bold text-center mb-4">
      <span class="text-primary">Contactez</span>
      <span class="text-white">Moi</span>
    </h2>
    <p class="text-gray-400 text-center mb-12 max-w-2xl mx-auto">
      N'hésitez pas à me contacter pour toute collaboration ou projet
    </p>
    
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 max-w-5xl mx-auto">
      <!-- Formulaire -->
      <div class="bg-dark/80 rounded-xl p-8 border border-gray-700">
        <!-- Message de succès -->
        <div *ngIf="successMessage" class="mb-6 p-4 bg-green-500/20 border border-green-500 rounded-lg text-green-400">
          {{ successMessage }}
        </div>
        
        <!-- Message d'erreur -->
        <div *ngIf="errorMessage" class="mb-6 p-4 bg-red-500/20 border border-red-500 rounded-lg text-red-400">
          {{ errorMessage }}
        </div>
        
        <!-- Formulaire -->
        <form (ngSubmit)="onSubmit($event)" #contactForm="ngForm">
          <div class="mb-6">
            <label class="block text-gray-300 mb-2">Nom complet *</label>
            <input 
              type="text" 
              name="name"
              id="name"
              #nameInput
              class="w-full px-4 py-3 bg-dark border border-gray-700 rounded-lg text-white focus:border-primary focus:outline-none transition-colors"
              placeholder="Votre nom"
              required
            >
          </div>
          <div class="mb-6">
            <label class="block text-gray-300 mb-2">Email *</label>
            <input 
              type="email" 
              name="email"
              id="email"
              #emailInput
              class="w-full px-4 py-3 bg-dark border border-gray-700 rounded-lg text-white focus:border-primary focus:outline-none transition-colors"
              placeholder="votre@email.com"
              required
            >
          </div>
          <div class="mb-6">
            <label class="block text-gray-300 mb-2">Message *</label>
            <textarea 
              name="message"
              id="message"
              #messageInput
              rows="5" 
              class="w-full px-4 py-3 bg-dark border border-gray-700 rounded-lg text-white focus:border-primary focus:outline-none transition-colors"
              placeholder="Votre message..."
              required
            ></textarea>
          </div>
          <button 
            type="submit" 
            [disabled]="isLoading"
            class="w-full px-8 py-3 bg-primary text-white rounded-lg hover:bg-primary/80 transition-colors transform hover:scale-105 duration-300 disabled:opacity-50 disabled:cursor-not-allowed"
          >
            {{ isLoading ? '⏳ Envoi en cours...' : '✉️ Envoyer le message' }}
          </button>
        </form>
      </div>
      
      <!-- Informations de contact -->
      <div class="flex flex-col justify-center gap-8">
        <a href="mailto:sarrasouissi13@gmail.com" class="flex items-center gap-4 hover:bg-primary/10 p-4 rounded-xl transition-colors">
          <div class="w-14 h-14 bg-primary/20 rounded-full flex items-center justify-center text-primary text-xl">
            <i class="fas fa-envelope"></i>
          </div>
          <div>
            <h4 class="text-white font-semibold">Email</h4>
            <p class="text-gray-400">sarrasouissi13@gmail.com</p>
          </div>
        </a>
        <a href="tel:+21652951584" class="flex items-center gap-4 hover:bg-primary/10 p-4 rounded-xl transition-colors">
          <div class="w-14 h-14 bg-primary/20 rounded-full flex items-center justify-center text-primary text-xl">
            <i class="fas fa-phone"></i>
          </div>
          <div>
            <h4 class="text-white font-semibold">Téléphone</h4>
            <p class="text-gray-400">+216 52 951 584</p>
          </div>
        </a>
        <a href="https://www.google.com/maps/place/Tunis" target="_blank" class="flex items-center gap-4 hover:bg-primary/10 p-4 rounded-xl transition-colors">
          <div class="w-14 h-14 bg-primary/20 rounded-full flex items-center justify-center text-primary text-xl">
            <i class="fas fa-map-marker-alt"></i>
          </div>
          <div>
            <h4 class="text-white font-semibold">Localisation</h4>
            <p class="text-gray-400">Tunis, Tunisie</p>
          </div>
        </a>
      </div>
    </div>
  </div>
</section>
