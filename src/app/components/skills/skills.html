<section id="skills" class="py-20 bg-dark/50">
  <div class="container-custom">
    <div class="text-center mb-16">
      <h2 class="text-4xl md:text-5xl font-bold mb-4">
        <span class="text-primary">Mes</span>
        <span class="text-white">Compétences</span>
      </h2>
      <p class="text-gray-400 max-w-2xl mx-auto">
        Technologies, outils et méthodologies que j'utilise au quotidien
      </p>
      <div class="w-24 h-1 bg-primary mx-auto mt-4 rounded-full"></div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <div
        *ngFor="let category of skillCategories"
        class="bg-dark/80 rounded-2xl p-6 border border-gray-700 hover:border-primary transition-all duration-300 hover:-translate-y-2 hover:shadow-xl hover:shadow-primary/10"
      >
        <div class="flex items-center gap-3 mb-6 pb-4 border-b border-gray-700">
          <span class="text-2xl">{{ category.icon }}</span>
          <h3 class="text-lg font-semibold text-white">{{ category.name }}</h3>
        </div>

        <div class="flex flex-wrap gap-2">
          <span
            *ngFor="let skill of category.skills"
            class="px-3 py-1.5 bg-dark border border-gray-700 rounded-lg text-gray-300 text-sm hover:border-primary hover:text-primary hover:scale-105 transition-all duration-300 cursor-default"
          >
            {{ skill }}
          </span>
        </div>
      </div>
    </div>
  </div>
</section>
