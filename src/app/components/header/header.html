<header [class.header-scrolled]="isScrolled" class="fixed top-0 left-0 right-0 z-50 bg-dark/80 backdrop-blur-lg border-b border-gray-800 transition-all duration-300">
  <div class="container-custom">
    <nav class="flex items-center justify-between h-16">
      <!-- Logo -->
      <a href="#hero" class="text-2xl font-bold">
        <span class="text-primary">S.</span>
        <span class="text-white">Souissi</span>
      </a>
      
      <!-- Desktop Menu -->
      <div class="hidden md:flex items-center gap-8">
        <a href="#hero" class="text-gray-300 hover:text-primary transition-colors text-sm font-medium relative group">
          Accueil
          <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-primary transition-all duration-300 group-hover:w-full"></span>
        </a>
        <a href="#about" class="text-gray-300 hover:text-primary transition-colors text-sm font-medium relative group">
          À propos
          <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-primary transition-all duration-300 group-hover:w-full"></span>
        </a>
        <a href="#skills" class="text-gray-300 hover:text-primary transition-colors text-sm font-medium relative group">
          Compétences
          <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-primary transition-all duration-300 group-hover:w-full"></span>
        </a>
        <a href="#projects" class="text-gray-300 hover:text-primary transition-colors text-sm font-medium relative group">
          Projets
          <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-primary transition-all duration-300 group-hover:w-full"></span>
        </a>
        <a href="#experience" class="text-gray-300 hover:text-primary transition-colors text-sm font-medium relative group">
          Expérience
          <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-primary transition-all duration-300 group-hover:w-full"></span>
        </a>
        <a href="#contact" class="px-4 py-2 bg-primary text-white rounded-full hover:bg-primary/80 transition-all duration-300 text-sm font-medium hover:shadow-lg hover:shadow-primary/20">
          Contact
        </a>
      </div>
      
      <!-- Mobile Menu Button -->
      <button (click)="toggleMenu()" class="md:hidden text-gray-300 hover:text-primary transition-colors">
        <i [class]="isMenuOpen ? 'fas fa-times' : 'fas fa-bars'" class="text-2xl"></i>
      </button>
    </nav>
    
    <!-- Mobile Menu -->
    <div *ngIf="isMenuOpen" class="md:hidden py-4 border-t border-gray-800 animate-slideDown">
      <div class="flex flex-col gap-4">
        <a href="#hero" (click)="closeMenu()" class="text-gray-300 hover:text-primary transition-colors text-sm font-medium px-4 py-2 hover:bg-primary/10 rounded-lg">
          Accueil
        </a>
        <a href="#about" (click)="closeMenu()" class="text-gray-300 hover:text-primary transition-colors text-sm font-medium px-4 py-2 hover:bg-primary/10 rounded-lg">
          À propos
        </a>
        <a href="#skills" (click)="closeMenu()" class="text-gray-300 hover:text-primary transition-colors text-sm font-medium px-4 py-2 hover:bg-primary/10 rounded-lg">
          Compétences
        </a>
        <a href="#projects" (click)="closeMenu()" class="text-gray-300 hover:text-primary transition-colors text-sm font-medium px-4 py-2 hover:bg-primary/10 rounded-lg">
          Projets
        </a>
        <a href="#experience" (click)="closeMenu()" class="text-gray-300 hover:text-primary transition-colors text-sm font-medium px-4 py-2 hover:bg-primary/10 rounded-lg">
          Expérience
        </a>
        <a href="#contact" (click)="closeMenu()" class="px-4 py-2 bg-primary text-white rounded-full hover:bg-primary/80 transition-all duration-300 text-sm font-medium text-center">
          Contact
        </a>
      </div>
    </div>
  </div>
</header>
